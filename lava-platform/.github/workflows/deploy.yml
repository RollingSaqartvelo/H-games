name: Deploy to server

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 89.223.121.214
          username: root
          key: ${{ secrets.SSH_DEPLOY_KEY }}
          script: |
            cd /root/lava-platform
            git fetch origin
            git reset --hard origin/master
            pkill -9 -f "lava-platform/server" || true
            pkill -9 server || true
            sleep 1
            cp lava-platform/server_linux lava-platform/server
            cd /root/lava-platform/lava-platform && SYSTEM_API_KEY=hgames-admin-2026 nohup ./server >> /root/server.log 2>&1 &
            echo "Deployed at $(date)"
