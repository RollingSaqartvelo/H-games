name: Deploy to server

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 89.223.121.214
          username: root
          key: ${{ secrets.SSH_DEPLOY_KEY }}
          script: |
            cd /root/lava-platform
            git fetch origin
            git reset --hard origin/master
            # Create .env with secrets if not present
            ENV_FILE=/root/lava-platform/lava-platform/.env
            if [ ! -f "$ENV_FILE" ]; then
              cp /root/lava-platform/lava-platform/.env.example "$ENV_FILE" 2>/dev/null || touch "$ENV_FILE"
            fi
            grep -q "SYSTEM_API_KEY=" "$ENV_FILE" || echo "SYSTEM_API_KEY=hgames-admin-2026" >> "$ENV_FILE"
            pkill -9 -f "lava-platform/server" || true
            sleep 1
            cp lava-platform/server_linux lava-platform/server
            cd /root/lava-platform && nohup lava-platform/server >> /root/server.log 2>&1 &
            echo "Deployed at $(date)"
