<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="link" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#ffe566"/><stop offset="40%" stop-color="#ffd700"/><stop offset="100%" stop-color="#8b6000"/></linearGradient>
    <linearGradient id="link2" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#ffc800"/><stop offset="100%" stop-color="#7a5500"/></linearGradient>
    <filter id="g"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <!-- Chain links - horizontal pattern -->
  <!-- Row 1 -->
  <ellipse cx="20" cy="35" rx="10" ry="6" fill="none" stroke="url(#link)" stroke-width="4.5"/>
  <ellipse cx="37" cy="35" rx="10" ry="6" fill="none" stroke="url(#link2)" stroke-width="4.5"/>
  <ellipse cx="54" cy="35" rx="10" ry="6" fill="none" stroke="url(#link)" stroke-width="4.5"/>
  <ellipse cx="71" cy="35" rx="10" ry="6" fill="none" stroke="url(#link2)" stroke-width="4.5"/>
  <ellipse cx="88" cy="35" rx="10" ry="6" fill="none" stroke="url(#link)" stroke-width="4.5"/>
  <!-- Row 2 (offset) -->
  <ellipse cx="12" cy="50" rx="10" ry="6" fill="none" stroke="url(#link2)" stroke-width="4.5"/>
  <ellipse cx="29" cy="50" rx="10" ry="6" fill="none" stroke="url(#link)" stroke-width="4.5"/>
  <ellipse cx="46" cy="50" rx="10" ry="6" fill="none" stroke="url(#link2)" stroke-width="4.5"/>
  <ellipse cx="63" cy="50" rx="10" ry="6" fill="none" stroke="url(#link)" stroke-width="4.5"/>
  <ellipse cx="80" cy="50" rx="10" ry="6" fill="none" stroke="url(#link2)" stroke-width="4.5"/>
  <!-- Row 3 -->
  <ellipse cx="20" cy="65" rx="10" ry="6" fill="none" stroke="url(#link)" stroke-width="4.5"/>
  <ellipse cx="37" cy="65" rx="10" ry="6" fill="none" stroke="url(#link2)" stroke-width="4.5"/>
  <ellipse cx="54" cy="65" rx="10" ry="6" fill="none" stroke="url(#link)" stroke-width="4.5"/>
  <ellipse cx="71" cy="65" rx="10" ry="6" fill="none" stroke="url(#link2)" stroke-width="4.5"/>
  <ellipse cx="88" cy="65" rx="10" ry="6" fill="none" stroke="url(#link)" stroke-width="4.5"/>
  <!-- Highlights on links -->
  <ellipse cx="20" cy="32" rx="6" ry="2.5" fill="rgba(255,255,200,0.3)"/>
  <ellipse cx="46" cy="47" rx="6" ry="2.5" fill="rgba(255,255,200,0.3)"/>
  <ellipse cx="54" cy="62" rx="6" ry="2.5" fill="rgba(255,255,200,0.3)"/>
  <!-- Diamond clasp -->
  <polygon points="50,8 58,16 50,24 42,16" fill="url(#link)" filter="url(#g)"/>
  <polygon points="50,10 56,16 50,22 44,16" fill="rgba(255,255,255,0.3)"/>
</svg>
