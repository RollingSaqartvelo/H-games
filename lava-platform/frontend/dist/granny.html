<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#020a03">
  <title>Granny Run — H-GAMES</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Rye&display=swap');
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    :root{
      --green:      #22c55e;
      --green-b:    #4ade80;
      --green-dim:  #14532d;
      --green-glow: rgba(34,197,94,.4);
      --red:        #ef4444;
      --red-glow:   rgba(239,68,68,.4);
      --bg:         #020a03;
      --surface:    #041008;
      --border:     #0d2e12;
      --text:       #d4ffd8;
      --muted:      #3a7a42;
      --gold:       #d97706;
    }
    html,body{
      width:100%;height:100%;overflow:hidden;
      background:var(--bg);color:var(--text);
      font-family:'Rye',Georgia,serif;
    }

    /* ── Layout ──────────────────────────────────────────────── */
    .app{
      display:flex;flex-direction:column;
      height:100dvh;
      padding-top:env(safe-area-inset-top,0px);
      padding-bottom:env(safe-area-inset-bottom,0px);
    }

    /* ── TopBar ─────────────────────────────────────────────── */
    .topbar{
      flex-shrink:0;height:48px;
      display:flex;align-items:center;justify-content:space-between;
      padding:0 14px;
      background:rgba(2,10,3,.95);
      border-bottom:1px solid var(--border);
      z-index:10;
    }
    .topbar-logo{font-size:13px;letter-spacing:2px;color:var(--green);text-transform:uppercase}
    .topbar-balance{
      font-family:'Courier New',monospace;font-size:13px;
      color:var(--green-b);display:flex;align-items:center;gap:6px;
    }
    .topbar-balance .coin{font-size:16px}
    .state-badge{
      font-family:'Courier New',monospace;font-size:10px;letter-spacing:1px;
      padding:3px 9px;border-radius:20px;text-transform:uppercase;
    }
    .state-badge.betting { background:rgba(34,197,94,.15);color:var(--green);border:1px solid var(--green-dim) }
    .state-badge.running { background:rgba(239,68,68,.15);color:#f87171;border:1px solid #7f1d1d }
    .state-badge.crashed { background:rgba(239,68,68,.2);color:#ef4444;border:1px solid #991b1b }

    /* ── History pills ──────────────────────────────────────── */
    .history{
      flex-shrink:0;height:34px;
      display:flex;align-items:center;gap:5px;padding:0 10px;
      overflow-x:auto;scrollbar-width:none;
      background:rgba(2,10,3,.9);border-bottom:1px solid var(--border);
    }
    .history::-webkit-scrollbar{display:none}
    .pill{
      flex-shrink:0;padding:2px 8px;border-radius:20px;
      font-family:'Courier New',monospace;font-size:10px;font-weight:bold;
    }
    .pill.low  {background:#0d2e12;color:#4ade80}
    .pill.med  {background:#142a00;color:#a3e635}
    .pill.high {background:#1a2000;color:#fbbf24}
    .pill.epic {background:#1a0a2a;color:#c084fc}

    /* ── Game area ──────────────────────────────────────────── */
    .game-area{
      flex:1;position:relative;overflow:hidden;
      background:#030810;
    }

    /* ── Scene canvas ───────────────────────────────────────── */
    #scene{
      position:absolute;inset:0;width:100%;height:100%;
    }

    /* ── Multiplier center display ──────────────────────────── */
    .mult-wrap{
      position:absolute;top:50%;left:50%;transform:translate(-50%,-60%);
      text-align:center;pointer-events:none;z-index:5;
    }
    .mult-val{
      font-size:72px;letter-spacing:-2px;
      text-shadow:0 0 40px var(--green-glow);
      transition:color .3s;
      line-height:1;
    }
    .mult-val.normal { color:var(--green-b) }
    .mult-val.hot    { color:#a3e635 }
    .mult-val.epic   { color:#c084fc }
    .mult-val.crashed{ color:var(--red);text-shadow:0 0 40px var(--red-glow) }
    .mult-x{font-size:32px;color:var(--muted);vertical-align:super}

    /* ── Countdown ──────────────────────────────────────────── */
    .countdown{
      position:absolute;bottom:16px;left:50%;transform:translateX(-50%);
      text-align:center;pointer-events:none;z-index:5;
    }
    .countdown-label{
      font-family:'Courier New',monospace;font-size:9px;letter-spacing:3px;
      text-transform:uppercase;color:var(--muted);margin-bottom:4px;
    }
    .countdown-val{
      font-size:38px;color:var(--green-b);
      text-shadow:0 0 20px var(--green-glow);
    }

    /* ── Crashed banner ─────────────────────────────────────── */
    .crashed-banner{
      display:none;
      position:absolute;inset:0;z-index:20;
      background:rgba(0,0,0,.75);
      align-items:center;justify-content:center;flex-direction:column;gap:8px;
    }
    .crashed-banner.show{display:flex}
    .crashed-title{
      font-size:52px;color:var(--red);letter-spacing:4px;
      text-shadow:0 0 60px var(--red-glow);
      animation:crashPulse .6s ease-in-out;
    }
    .crashed-point{
      font-family:'Courier New',monospace;font-size:18px;color:#f87171;
    }
    @keyframes crashPulse{0%{transform:scale(1.4)}100%{transform:scale(1)}}

    /* ── Bet panel ──────────────────────────────────────────── */
    .bet-footer{
      flex-shrink:0;
      background:rgba(2,10,3,.97);
      border-top:1px solid var(--border);
      padding:8px;
      padding-bottom:max(env(safe-area-inset-bottom,8px),8px);
      display:flex;gap:6px;
      overflow:hidden;   /* prevent panel B from spilling off-screen */
    }

    .bet-panel{
      flex:1 1 0;        /* flex-basis:0 ensures equal split regardless of content */
      min-width:0;       /* allow shrinking below intrinsic width */
      background:#041008;
      border:1px solid var(--border);
      border-radius:12px;
      padding:8px;
      display:flex;flex-direction:column;gap:5px;
    }
    .bet-panel.active-bet { border-color:var(--green) }
    .bet-panel.crashed-bet{ border-color:#7f1d1d }

    .bp-label{
      font-family:'Courier New',monospace;font-size:8px;letter-spacing:2px;
      text-transform:uppercase;color:var(--muted);
    }
    .bp-amount-row{display:flex;gap:4px;align-items:center}
    .bp-amount{
      flex:1;background:#020a03;border:1px solid var(--border);
      border-radius:7px;padding:7px 8px;
      font-family:'Courier New',monospace;font-size:14px;color:var(--text);
      outline:none;
    }
    .bp-amount:focus{border-color:var(--green-dim)}
    .bp-quick{display:flex;gap:3px}
    .bp-q{
      flex:1;padding:4px 0;font-size:9px;
      background:#041008;border:1px solid var(--border);
      border-radius:5px;color:var(--muted);cursor:pointer;
      font-family:'Courier New',monospace;
    }
    .bp-q:active{background:#0d2e12;color:var(--green)}

    .bp-cashout-row{display:flex;gap:4px;align-items:center}
    .bp-cashout-label{
      font-family:'Courier New',monospace;font-size:8px;
      color:var(--muted);white-space:nowrap;
    }
    .bp-cashout{
      flex:1;background:#020a03;border:1px solid var(--border);
      border-radius:7px;padding:5px 8px;
      font-family:'Courier New',monospace;font-size:12px;color:var(--text);
      outline:none;
    }

    .bp-btn{
      width:100%;padding:10px;border-radius:8px;
      font-family:'Rye',Georgia,serif;font-size:13px;letter-spacing:1px;
      cursor:pointer;transition:all .15s;
    }
    .bp-btn-bet{
      background:linear-gradient(135deg,#0a3a12,#16701f,#0a3a12);
      border:1px solid var(--green);color:#d4ffd8;
      box-shadow:0 0 14px var(--green-glow);
    }
    .bp-btn-bet:disabled{opacity:.35;cursor:default;box-shadow:none}
    .bp-btn-cashout{
      background:linear-gradient(135deg,#3a0a0a,#901010,#3a0a0a);
      border:1px solid var(--red);color:#ffd4d4;
      box-shadow:0 0 14px var(--red-glow);
      animation:cashoutPulse 1s ease-in-out infinite;
    }
    @keyframes cashoutPulse{
      0%,100%{box-shadow:0 0 10px var(--red-glow)}
      50%    {box-shadow:0 0 25px var(--red-glow),0 0 40px rgba(239,68,68,.2)}
    }
    .bp-payout{
      font-family:'Courier New',monospace;font-size:10px;
      color:var(--green);text-align:center;
    }

    /* ── No session ─────────────────────────────────────────── */
    .no-session{
      text-align:center;padding:16px;
      font-family:'Courier New',monospace;font-size:11px;color:var(--muted);
    }

    /* ── Social cashout ticker ───────────────────────────────── */
    .social-ticker{
      position:absolute;top:8px;right:8px;z-index:6;
      display:flex;flex-direction:column;gap:4px;
      pointer-events:none;max-width:175px;
    }
    .social-tick{
      background:rgba(2,16,4,0.88);
      border:1px solid var(--green-dim);
      border-radius:8px;padding:4px 8px;
      font-family:'Courier New',monospace;font-size:10px;
      color:var(--green-b);
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
      animation:tickIn .3s ease;
    }
    .social-tick--out{ animation:tickOut .4s ease forwards }
    @keyframes tickIn { from{opacity:0;transform:translateX(16px)} to{opacity:1;transform:translateX(0)} }
    @keyframes tickOut{ to  {opacity:0;transform:translateX(16px)} }

    /* ── Betting video overlay (mirrors React BettingVideo.tsx) ── */
    .bvb-wrap{
      position:absolute;inset:0;z-index:2;
      pointer-events:none;
      opacity:1;
      transition:opacity 600ms ease;
    }
    .bvb-wrap--out    { opacity:0 }
    .bvb-wrap--hidden { display:none }
    .bvb-vignette{
      position:absolute;inset:0;
      background:radial-gradient(ellipse at center,transparent 30%,rgba(2,10,3,.65) 100%);
      pointer-events:none;
    }

    /* ── Warning overlay at ≤3 s ─────────────────────────────── */
    .bvb-warning{
      position:absolute;inset:0;z-index:3;
      display:flex;align-items:center;justify-content:center;
      pointer-events:none;
      animation:warningPulse .55s ease-in-out infinite alternate;
    }
    .bvb-warning img{
      max-width:85%;max-height:60%;object-fit:contain;
    }
    .bvb-warning-text{
      font-size:30px;color:#ef4444;letter-spacing:4px;text-align:center;
      text-shadow:0 0 30px rgba(239,68,68,.8);
      font-family:'Rye',Georgia,serif;
    }
    @keyframes warningPulse{
      from{opacity:.8;transform:scale(.97)}
      to  {opacity:1;transform:scale(1)}
    }
  </style>
</head>
<body>
<div class="app">

  <!-- TopBar -->
  <div class="topbar">
    <div class="topbar-balance">
      <span class="coin">💊</span>
      <span id="balance">—</span>
    </div>
    <div class="topbar-logo">GRANNY RUN</div>
    <div class="state-badge betting" id="stateBadge">BETTING</div>
  </div>

  <!-- History -->
  <div class="history" id="history"></div>

  <!-- Game area -->
  <div class="game-area">
    <canvas id="scene"></canvas>

    <!-- z:2 — Betting video bg; visible during STARTING/CREATED, fades on RUNNING -->
    <div class="bvb-wrap" id="bvbWrap" aria-hidden="true">
      <video
        id="bvbVideo"
        src="/video/granny-betting-loop.mp4"
        autoplay loop muted playsinline preload="auto"
        webkit-playsinline="true"
        style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center;display:block"
      ></video>
      <!-- Fallback static image if video fails -->
      <img
        id="bvbFallback"
        src="/assets/betting/granny_betting_static.png"
        alt=""
        style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none"
      >
      <div class="bvb-vignette"></div>
    </div>

    <!-- z:3 — Warning overlay at ≤3 s -->
    <div class="bvb-warning" id="bvbWarning" style="display:none" aria-hidden="true">
      <img
        id="bvbWarningImg"
        src="/assets/betting/Warnings/granny_warning.png"
        alt=""
        onerror="this.style.display='none';document.getElementById('bvbWarningText').style.display='block'"
      >
      <div class="bvb-warning-text" id="bvbWarningText" style="display:none">⚡ LAST SECONDS!</div>
    </div>

    <!-- Multiplier -->
    <div class="mult-wrap">
      <div class="mult-val normal" id="multVal">1.00<span class="mult-x">×</span></div>
    </div>

    <!-- Countdown -->
    <div class="countdown" id="countdown" style="display:none">
      <div class="countdown-label">Heist starts in</div>
      <div class="countdown-val" id="countdownVal">10</div>
    </div>

    <!-- Crashed banner -->
    <div class="crashed-banner" id="crashedBanner">
      <div class="crashed-title">INJECTED!</div>
      <div class="crashed-point" id="crashedPoint">Doctor: 1.00×</div>
    </div>

    <!-- z:6 — Social cashout ticker (top-right, like Outlaw SocialTicker) -->
    <div class="social-ticker" id="socialTicker"></div>
  </div>

  <!-- Bet panels -->
  <div class="bet-footer" id="betFooter">
    <div class="no-session" id="noSession" style="display:none;width:100%">
      Open via Telegram bot to play
    </div>
    <div class="bet-panel" id="panel0" style="display:none">
      <div class="bp-label">Bet A</div>
      <div class="bp-amount-row">
        <input class="bp-amount" id="amount0" type="number" min="0.1" step="0.1" value="1.00" placeholder="0.00">
      </div>
      <div class="bp-quick">
        <button class="bp-q" onclick="addAmount(0,1)">+1</button>
        <button class="bp-q" onclick="addAmount(0,5)">+5</button>
        <button class="bp-q" onclick="addAmount(0,10)">+10</button>
        <button class="bp-q" onclick="halvAmount(0)">½</button>
      </div>
      <div class="bp-cashout-row">
        <span class="bp-cashout-label">Auto ×</span>
        <input class="bp-cashout" id="cashout0" type="number" min="1.1" step="0.1" placeholder="off">
      </div>
      <div id="payout0" class="bp-payout" style="display:none"></div>
      <button class="bp-btn bp-btn-bet" id="btn0" onclick="handleBtn(0)">BET</button>
    </div>
    <div class="bet-panel" id="panel1" style="display:none">
      <div class="bp-label">Bet B</div>
      <div class="bp-amount-row">
        <input class="bp-amount" id="amount1" type="number" min="0.1" step="0.1" value="1.00" placeholder="0.00">
      </div>
      <div class="bp-quick">
        <button class="bp-q" onclick="addAmount(1,1)">+1</button>
        <button class="bp-q" onclick="addAmount(1,5)">+5</button>
        <button class="bp-q" onclick="addAmount(1,10)">+10</button>
        <button class="bp-q" onclick="halvAmount(1)">½</button>
      </div>
      <div class="bp-cashout-row">
        <span class="bp-cashout-label">Auto ×</span>
        <input class="bp-cashout" id="cashout1" type="number" min="1.1" step="0.1" placeholder="off">
      </div>
      <div id="payout1" class="bp-payout" style="display:none"></div>
      <button class="bp-btn bp-btn-bet" id="btn1" onclick="handleBtn(1)">BET</button>
    </div>
  </div>

</div>

<script>
// ── Telegram SDK ──────────────────────────────────────────────────────────────
const tg = window.Telegram?.WebApp
if (tg) { tg.ready(); tg.expand(); tg.disableVerticalSwipes?.() }

// ── Session / Auth ────────────────────────────────────────────────────────────
let TOKEN = sessionStorage.getItem('crash_token') || ''
let PLAYER_ID = ''
let CURRENCY  = 'USD'

async function auth() {
  const initData = tg?.initData || ''
  if (!initData && !TOKEN) {
    document.getElementById('noSession').style.display = 'block'
    return
  }
  if (TOKEN) { showPanels(); await fetchBalance(); return }
  try {
    const r = await fetch('/tma/auth', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ init_data: initData }),
    })
    if (!r.ok) { document.getElementById('noSession').style.display='block'; return }
    const d = await r.json()
    if (!d.token) { document.getElementById('noSession').style.display='block'; return }
    TOKEN = d.token
    PLAYER_ID = d.player_id || ''
    CURRENCY  = d.currency  || 'USD'
    sessionStorage.setItem('crash_token', TOKEN)
    if (d.balance != null) document.getElementById('balance').textContent = '$'+parseFloat(d.balance).toFixed(2)
    showPanels()
  } catch { document.getElementById('noSession').style.display='block' }
}

function showPanels() {
  document.getElementById('panel0').style.display = 'flex'
  document.getElementById('panel1').style.display = 'flex'
  document.getElementById('noSession').style.display = 'none'
}

async function fetchBalance() {
  try {
    const r = await fetch('/tma/auth', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ init_data: tg?.initData || '' }),
    })
    const d = await r.json()
    if (d.balance != null) document.getElementById('balance').textContent = '$'+parseFloat(d.balance).toFixed(2)
    if (d.player_id) PLAYER_ID = d.player_id
    if (d.currency)  CURRENCY  = d.currency
  } catch {}
}

// ── State ─────────────────────────────────────────────────────────────────────
let roundState = 'CREATED'
let roundId    = ''
let multiplier = 1.00
let bets = [
  { id:'', active:false, cashedOut:false, currency:'USD', amount:1 },
  { id:'', active:false, cashedOut:false, currency:'USD', amount:1 },
]
let historyItems = []
let startedAt = 0

// ── Canvas scene ──────────────────────────────────────────────────────────────
const canvas = document.getElementById('scene')
const ctx    = canvas.getContext('2d')
let animFrame = 0

// Character state
let grannyY = 0, grannyX = 0.62, doctorY = 0, grannyOsc = 0, doctorOsc = 0, flameT = 0

// Parallax state
let bgOff = 0, lastTs = 0

// ── Background image (preloaded during BETTING so no flicker on RUNNING) ──────
const bgImg = new Image()
let bgImgReady = false
bgImg.onload = () => { bgImgReady = true }
bgImg.src = '/assets/granny%20bg/grannybg.jpeg'

// ── Character assets ──────────────────────────────────────────────────────────
const grannyImg = new Image(), doctorImg = new Image()
let grannyImgReady = false, doctorImgReady = false
grannyImg.onload = () => { grannyImgReady = true }
doctorImg.onload = () => { doctorImgReady = true }
grannyImg.src = '/assets/granny/granny%20hero.png'
doctorImg.src = '/assets/granny/medicin%20hero.png'

function resizeCanvas() {
  const ga = canvas.parentElement
  canvas.width  = ga.clientWidth
  canvas.height = ga.clientHeight
  grannyY = canvas.height * 0.42
  doctorY = canvas.height * 0.62
}
resizeCanvas()
window.addEventListener('resize', resizeCanvas)

// ── Seeded pseudo-random (deterministic by position — no jitter on scroll) ────
function rnd(s) { const x = Math.sin(s*9301+49297)*233280; return x - Math.floor(x) }

// ── Layer 5: Night sky + stars + clouds ──────────────────────────────────────
function drawSky(W, H) {
  const g = ctx.createLinearGradient(0, 0, 0, H*0.78)
  g.addColorStop(0,    '#030810')
  g.addColorStop(0.38, '#0b1527')
  g.addColorStop(0.74, '#172d4a')
  g.addColorStop(1,    '#1e3a60')
  ctx.fillStyle = g
  ctx.fillRect(0, 0, W, H)
}

function drawStars(W, H, off) {
  const sOff = off * 0.018
  ctx.fillStyle = '#ffffff'
  for (let i = 0; i < 55; i++) {
    const sx = ((rnd(i*3+1)*W*2.5 - sOff) % (W*2) + W*2) % (W*2) - W*0.25
    const sy = rnd(i*3+2) * H * 0.40
    ctx.globalAlpha = 0.35 + rnd(i*3+3)*0.65
    ctx.fillRect(sx, sy, 1.5, 1.5)
  }
  ctx.globalAlpha = 1
}

function drawClouds(W, H, off) {
  const cOff = off * 0.055
  for (let i = 0; i < 5; i++) {
    const cx = ((rnd(i+80)*W*2.4 - cOff) % (W*2) + W*2) % (W*2) - 60
    const cy = H*0.05 + rnd(i+80.1)*H*0.20
    const cr = 38 + rnd(i+80.2)*52
    ctx.fillStyle = `rgba(18,42,88,${0.30+rnd(i+80.3)*0.28})`
    ctx.beginPath()
    ctx.arc(cx,          cy,          cr,       0, Math.PI*2)
    ctx.arc(cx+cr*.88,   cy+cr*.12,   cr*.62,   0, Math.PI*2)
    ctx.arc(cx-cr*.88,   cy+cr*.12,   cr*.62,   0, Math.PI*2)
    ctx.arc(cx+cr*.32,   cy-cr*.42,   cr*.46,   0, Math.PI*2)
    ctx.fill()
  }
}

// ── Layer 4: Distant forest / tree silhouette ─────────────────────────────────
function drawForest(W, H, off) {
  const fOff  = off * 0.14
  const baseY = H * 0.63
  const TILE  = 72
  ctx.fillStyle = '#0c2212'
  const s = Math.floor(fOff/TILE)-1, e = s + Math.ceil(W/TILE) + 3
  for (let i = s; i <= e; i++) {
    const x  = i*TILE - (fOff % TILE)
    const h1 = 30+rnd(i*7+200)*44, w1 = 22+rnd(i*7+201)*30
    ctx.beginPath(); ctx.moveTo(x,baseY); ctx.lineTo(x+w1/2,baseY-h1); ctx.lineTo(x+w1,baseY); ctx.closePath(); ctx.fill()
    const x2=x+w1*0.55, h2=18+rnd(i*7+202)*34, w2=18+rnd(i*7+203)*26
    ctx.beginPath(); ctx.moveTo(x2,baseY); ctx.lineTo(x2+w2/2,baseY-h2); ctx.lineTo(x2+w2,baseY); ctx.closePath(); ctx.fill()
  }
}

// ── Layer 3: Distant skyline (skyscrapers) ────────────────────────────────────
function drawSkyline(W, H, off) {
  const sOff = off * 0.22, baseY = H * 0.67, TILE = 96
  const s = Math.floor(sOff/TILE)-1, e = s + Math.ceil(W/TILE) + 3
  for (let i = s; i <= e; i++) {
    const r1=rnd(i*11+300), r2=rnd(i*11+301), r3=rnd(i*11+302)
    const bW=38+r1*48, bH=65+r2*162, bX=i*TILE-(sOff%TILE), bY=baseY-bH
    ctx.fillStyle = `rgb(${8+r3*12|0},${16+r3*18|0},${30+r3*22|0})`
    ctx.fillRect(bX, bY, bW, bH)
    if (bH > 140 && r1 > 0.5) {
      ctx.fillStyle = '#08172a'; ctx.fillRect(bX+bW/2-1, bY-18, 2.5, 18)
      ctx.fillStyle = '#ff3030'; ctx.beginPath(); ctx.arc(bX+bW/2, bY-20, 2, 0, Math.PI*2); ctx.fill()
    }
    const rows=Math.floor(bH/13)|0, cols=Math.floor(bW/9)|0
    for (let row=0; row<rows-1; row++) for (let col=0; col<cols; col++) {
      if (rnd(i*300+row*10+col) > 0.50) {
        const w=rnd(i*50+row+col)
        ctx.fillStyle = w>0.45 ? `rgba(255,${170+w*55|0},70,${0.4+w*0.42})` : `rgba(155,205,255,0.52)`
        ctx.fillRect(bX+2+col*9, bY+5+row*13, 5, 7)
      }
    }
  }
}

// ── Layer 2: Midground buildings + hospital ───────────────────────────────────
function drawMidground(W, H, off) {
  const mOff = off * 0.50, baseY = H * 0.77, TILE = 118
  const s = Math.floor(mOff/TILE)-1, e = s + Math.ceil(W/TILE) + 3
  for (let i = s; i <= e; i++) {
    const r1=rnd(i*13+400),r2=rnd(i*13+401),r3=rnd(i*13+402),r4=rnd(i*13+403)
    const bW=58+r1*52, bH=48+r2*115, bX=i*TILE-(mOff%TILE), bY=baseY-bH
    const isHosp = r4 > 0.80
    if (isHosp) {
      ctx.fillStyle = '#c4dbd2'; ctx.fillRect(bX, bY, bW, bH)
      const cx=bX+bW/2
      ctx.fillStyle = '#e53e3e'
      ctx.fillRect(cx-2.5, bY+6, 5, 15); ctx.fillRect(cx-8, bY+10, 16, 5)
      const rows=Math.floor(bH/19)|0, cols=Math.floor(bW/15)|0
      ctx.fillStyle='rgba(255,255,185,0.9)'
      for (let row=0;row<rows-1;row++) for (let col=0;col<cols;col++)
        if (rnd(i*400+row*15+col)>0.35) ctx.fillRect(bX+5+col*15, bY+8+row*19, 8, 11)
    } else {
      const sh=0.07+r3*0.12
      ctx.fillStyle=`rgb(${sh*210|0},${(sh+0.02)*235|0},${(sh+0.08)*255|0})`
      ctx.fillRect(bX, bY, bW, bH)
      const rows=Math.floor(bH/18)|0, cols=Math.floor(bW/13)|0
      for (let row=0;row<rows-1;row++) for (let col=0;col<cols;col++) {
        if (rnd(i*400+row*13+col)>0.44) {
          const w=rnd(i*100+row*13+col)
          ctx.fillStyle=`rgba(${210+w*45|0},${140+w*80|0},60,${0.62+w*0.3})`
          ctx.fillRect(bX+4+col*13, bY+6+row*18, 7, 10)
        }
      }
      const numAC=Math.floor(r3*4)
      ctx.fillStyle='#0f1e38'
      for (let a=0;a<numAC;a++) ctx.fillRect(bX+a*16+4, bY-8, 12, 7)
    }
  }
}

// ── Layer 1: Road / streetlights / cars ──────────────────────────────────────
function drawGround(W, H, off, ts) {
  const gY = H * 0.78

  // Sidewalk strip
  ctx.fillStyle = '#1c2334'; ctx.fillRect(0, gY, W, 10)

  // Road surface gradient
  const rg = ctx.createLinearGradient(0, gY+10, 0, H)
  rg.addColorStop(0,'#131320'); rg.addColorStop(1,'#090910')
  ctx.fillStyle = rg; ctx.fillRect(0, gY+10, W, H-gY-10)

  // Center lane dashes
  const laneY = gY+10+(H-gY-10)*0.44, dW=28, dG=22, lOff=off%(dW+dG)
  ctx.fillStyle='#b08a10'
  for (let x=-lOff; x<W+dW; x+=dW+dG) ctx.fillRect(x, laneY-1.5, dW, 3)

  // Streetlights
  const ltOff=off%160
  for (let x=-ltOff; x<W+40; x+=160) {
    ctx.strokeStyle='#28384e'; ctx.lineWidth=2.5
    ctx.beginPath(); ctx.moveTo(x,gY); ctx.lineTo(x,gY-52); ctx.lineTo(x+22,gY-52); ctx.stroke()
    const glow=ctx.createRadialGradient(x+22,gY-52,2,x+22,gY-52,28)
    glow.addColorStop(0,'rgba(255,188,65,0.52)'); glow.addColorStop(0.4,'rgba(255,188,65,0.13)'); glow.addColorStop(1,'rgba(255,188,65,0)')
    ctx.fillStyle=glow; ctx.beginPath(); ctx.arc(x+22,gY-52,28,0,Math.PI*2); ctx.fill()
    ctx.fillStyle='#ffd855'; ctx.beginPath(); ctx.arc(x+22,gY-52,3,0,Math.PI*2); ctx.fill()
  }

  // Cars
  const COLS=['#c0392b','#2471a3','#1e8449','#b7950b','#7b241c','#e8e8e8','#2e4057','#d35400']
  const roadTop=gY+12, laneH=(H-gY-12)/2
  for (let lane=0; lane<2; lane++) {
    const lY=roadTop+lane*laneH+laneH*0.28, spd=1.0+lane*0.38
    for (let i=0; i<4; i++) {
      const cs=lane*200+i*31
      const cX=W+50 - ((off*spd + rnd(cs)*180 + i*230) % (W+130))
      const cW=46+rnd(cs+1)*18, cH=14+rnd(cs+2)*6
      const isAmb=rnd(cs+4)>0.87
      ctx.fillStyle = isAmb ? '#f0f0ee' : COLS[Math.floor(rnd(cs+3)*COLS.length)]
      ctx.beginPath()
      if (ctx.roundRect) ctx.roundRect(cX, lY-cH/2, cW, cH, 3)
      else ctx.rect(cX, lY-cH/2, cW, cH)
      ctx.fill()
      if (isAmb) {
        ctx.fillStyle='rgba(200,0,0,0.75)'; ctx.fillRect(cX+4, lY-cH/2+cH*0.30, cW-8, cH*0.22)
        ctx.fillStyle=Math.sin(ts*0.008+cs)>0?'#e53e3e':'#3182ce'
        ctx.beginPath(); ctx.arc(cX+cW/2, lY-cH/2-3, 3.5, 0, Math.PI*2); ctx.fill()
      }
      ctx.fillStyle='rgba(255,215,95,0.85)'
      ctx.beginPath(); ctx.arc(cX+cW+1, lY-3.5, 2.5, 0, Math.PI*2); ctx.arc(cX+cW+1, lY+3.5, 2.5, 0, Math.PI*2); ctx.fill()
      ctx.fillStyle='rgba(200,25,25,0.82)'
      ctx.beginPath(); ctx.arc(cX-1, lY-3.5, 2.5, 0, Math.PI*2); ctx.arc(cX-1, lY+3.5, 2.5, 0, Math.PI*2); ctx.fill()
    }
  }
}

// ── Image-based scrolling background (grannybg.jpeg mirror-loop) ──────────────
function drawBackground(W, H, off, camY) {
  if (!bgImgReady) {
    // Still loading — use procedural fallback so screen is never black
    drawSky(W, H); drawStars(W, H, off); drawClouds(W, H, off)
    drawForest(W, H, off); drawSkyline(W, H, off); drawMidground(W, H, off)
    drawGround(W, H, off, performance.now())
    return
  }

  // Scale image to cover canvas height, preserve aspect ratio
  const aspect  = bgImg.naturalWidth / bgImg.naturalHeight
  const drawH   = H + Math.abs(camY) * 2   // extra height for pan headroom
  const drawW   = drawH * aspect

  // Mirror-loop: original tile then horizontally-flipped tile → seamless seam
  const cycleW  = drawW * 2
  const xOff    = off % cycleW
  const tileY   = -camY                    // vertical camera offset

  for (let i = -1; i <= Math.ceil(W / drawW) + 2; i++) {
    const tileX = i * cycleW - xOff

    // Original copy
    if (tileX + drawW > 0 && tileX < W) {
      ctx.drawImage(bgImg, tileX, tileY, drawW, drawH)
    }

    // Mirrored copy (flip horizontal so the seam is invisible)
    const mX = tileX + drawW
    if (mX + drawW > 0 && mX < W) {
      ctx.save()
      ctx.translate(mX + drawW, tileY)
      ctx.scale(-1, 1)
      ctx.drawImage(bgImg, 0, 0, drawW, drawH)
      ctx.restore()
    }
  }
}

// ── Main draw loop ─────────────────────────────────────────────────────────────
function drawScene(ts) {
  const W = canvas.width, H = canvas.height
  ctx.clearRect(0, 0, W, H)

  const dt = lastTs > 0 ? Math.min((ts - lastTs) / 1000, 0.05) : 0
  lastTs = ts

  const running = roundState === 'RUNNING'
  const crashed = roundState === 'CRASHED'

  // Update parallax offset
  if (running)                    bgOff += 160 * Math.pow(Math.max(multiplier,1), 0.6) * dt
  else if (roundState==='STARTING') bgOff += 18 * dt

  flameT    = ts * 0.001
  grannyOsc = Math.sin(ts * 0.003) * 4
  doctorOsc = Math.sin(ts * 0.003 + 1.3) * 3  // offset phase from granny

  // ── Background: grannybg.jpeg scrolling map ─────────────────────────────────
  const camY = (1 - Math.min(grannyY, H) / H) * H * 0.10
  drawBackground(W, H, bgOff, camY)

  // ── Character Y animation ──────────────────────────────────────────────────
  if (running) {
    const progress = Math.min((multiplier - 1) / 9, 1)
    // Granny flies up; doctor stays in mid-air pursuit lane below her
    grannyY += (H*0.45 - progress*H*0.32 - grannyY) * 0.05  // 45% → 13%
    doctorY += (H*0.62 - doctorY) * 0.04
  } else if (crashed) {
    grannyY += (H*0.55 - grannyY) * 0.07
    doctorY += (grannyY - 35 - doctorY) * 0.09  // doctor catches up behind granny
  } else {
    // Idle hover during BETTING
    grannyY += (H*0.42 + Math.sin(ts*0.0015)*6 - grannyY) * 0.05
    doctorY += (H*0.62 + Math.sin(ts*0.0015+1.2)*4 - doctorY) * 0.05
  }

  const gX = W * grannyX   // 0.62 — granny ahead (right)
  const dX = W * 0.28       // doctor behind (left)

  // ── Doctor (drawn first — behind granny in z-order) ───────────────────────
  ctx.save()
  ctx.translate(dX, doctorY + doctorOsc)
  if (crashed) ctx.translate(gX - dX, grannyY - doctorY - 10)
  if (doctorImgReady) {
    const dH = 88, dW = dH * (doctorImg.naturalWidth / doctorImg.naturalHeight)
    ctx.drawImage(doctorImg, -dW / 2, -dH / 2, dW, dH)
  } else {
    ctx.font='38px serif'; ctx.textAlign='center'; ctx.textBaseline='middle'
    ctx.fillText('👨‍⚕️', 0, 0)
    ctx.save(); ctx.rotate(-Math.PI/4); ctx.font='22px serif'; ctx.fillText('💉', -16, -16); ctx.restore()
  }
  ctx.restore()

  // ── Granny (drawn after doctor — in front) ─────────────────────────────────
  ctx.save()
  ctx.translate(gX, grannyY + grannyOsc)
  if (crashed) ctx.rotate(Math.PI / 10)
  if (grannyImgReady) {
    const gH = 105, gW = gH * (grannyImg.naturalWidth / grannyImg.naturalHeight)
    ctx.drawImage(grannyImg, -gW / 2, -gH / 2, gW, gH)
  } else {
    ctx.font='42px serif'; ctx.textAlign='center'; ctx.textBaseline='middle'
    ctx.fillText('👵', 0, 0)
    ctx.font='24px serif'; ctx.fillText('🚀', 10, 20)
  }
  ctx.restore()

  // ── INJECTED crash text ────────────────────────────────────────────────────
  if (crashed) {
    ctx.save(); ctx.font='bold 16px Courier New'; ctx.fillStyle='#ef4444'; ctx.textAlign='center'
    ctx.fillText('INJECTED! 💉', W/2, H*0.28); ctx.restore()
  }

  animFrame = requestAnimationFrame(drawScene)
}
animFrame = requestAnimationFrame(drawScene)

// ── WebSocket ─────────────────────────────────────────────────────────────────
let ws, wsRetry = 0

function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws'
  ws = new WebSocket(`${proto}://${location.host}/ws/granny`)

  ws.onopen  = () => { wsRetry = 0 }
  ws.onclose = () => { setTimeout(connectWS, Math.min(1000 * 2**wsRetry++, 15000)) }
  ws.onerror = () => ws.close()

  ws.onmessage = e => {
    let msg; try { msg = JSON.parse(e.data) } catch { return }
    const d = msg.data

    if (msg.type === 'state') {
      roundState = d.state
      roundId    = d.id
      updateBadge()
      if (d.state === 'STARTING') {
        multiplier = 1.00
        updateMult(1.00)
        updateMultVis()
        document.getElementById('crashedBanner').classList.remove('show')
        startedAt = Date.now()
        showCountdown()
        resetBetsOnNewRound()
        bvbOnStateChange('STARTING')   // startedAt must be set before this call
      }
      if (d.state === 'RUNNING') {
        startedAt = d.started_at ? d.started_at * 1000 : Date.now()
        document.getElementById('countdown').style.display = 'none'
        document.getElementById('crashedBanner').classList.remove('show')
        updateMultVis()
        bvbOnStateChange('RUNNING')
      }
    }

    if (msg.type === 'tick') {
      multiplier = d.multiplier
      updateMult(d.multiplier)
      updateAutoCashoutPreviews()
    }

    if (msg.type === 'cashout') {
      addSocialTick(d.player_id, d.multiplier, d.payout)
    }

    if (msg.type === 'crashed') {
      roundState = 'CRASHED'
      updateMultVis()
      updateBadge()
      document.getElementById('countdown').style.display = 'none'
      document.getElementById('crashedPoint').textContent = 'Doctor: ' + d.crash_point.toFixed(2) + '×'
      document.getElementById('crashedBanner').classList.add('show')
      updateMult(d.crash_point, true)
      addHistory(d.crash_point)
      markLostBets()
      bvbOnStateChange('CRASHED')
      setTimeout(fetchBalance, 1500)
    }
  }
}

// ── UI helpers ────────────────────────────────────────────────────────────────
function updateBadge() {
  const el = document.getElementById('stateBadge')
  el.className = 'state-badge ' + (roundState==='RUNNING'?'running':roundState==='CRASHED'?'crashed':'betting')
  el.textContent = roundState === 'CRASHED' ? 'CAUGHT' : roundState === 'RUNNING' ? 'RUNNING' : 'BETTING'
}

function updateMultVis() {
  const show = roundState === 'RUNNING' || roundState === 'CRASHED'
  const el = document.querySelector('.mult-wrap')
  if (el) el.style.visibility = show ? 'visible' : 'hidden'
}

function updateMult(v, crashed=false) {
  const el = document.getElementById('multVal')
  el.innerHTML = v.toFixed(2) + '<span class="mult-x">×</span>'
  if (crashed) { el.className='mult-val crashed'; return }
  if (v >= 5)       el.className='mult-val epic'
  else if (v >= 2)  el.className='mult-val hot'
  else              el.className='mult-val normal'
  // Live payout preview for active bets
  bets.forEach((b,i) => {
    if (b.active && !b.cashedOut) {
      const payEl = document.getElementById('payout'+i)
      payEl.textContent = 'Est. $' + (b.amount * v).toFixed(2)
      payEl.style.display = 'block'
    }
  })
}

function showCountdown() {
  const el = document.getElementById('countdown')
  el.style.display = 'block'
  const tick = () => {
    if (roundState !== 'STARTING') { el.style.display='none'; return }
    const rem = Math.max(0, 10 - (Date.now()-startedAt)/1000)
    document.getElementById('countdownVal').textContent = rem.toFixed(1)
    setTimeout(tick, 100)
  }
  tick()
}

function addHistory(cp) {
  historyItems.unshift(cp)
  if (historyItems.length > 20) historyItems.pop()
  const el = document.getElementById('history')
  el.innerHTML = historyItems.map(v => {
    const cls = v >= 10 ? 'epic' : v >= 3 ? 'high' : v >= 2 ? 'med' : 'low'
    return `<span class="pill ${cls}">${v.toFixed(2)}×</span>`
  }).join('')
}

// ── Bet logic ─────────────────────────────────────────────────────────────────
function resetBetsOnNewRound() {
  bets.forEach((b,i) => {
    if (b.cashedOut || !b.active) {
      b.id = ''; b.active = false; b.cashedOut = false
      document.getElementById('panel'+i).classList.remove('active-bet','crashed-bet')
      document.getElementById('payout'+i).style.display = 'none'
      updateBtnState(i)
    }
  })
}

function markLostBets() {
  bets.forEach((b,i) => {
    if (b.active && !b.cashedOut) {
      b.active = false
      document.getElementById('panel'+i).classList.add('crashed-bet')
      document.getElementById('payout'+i).style.display = 'none'
      updateBtnState(i)
    }
  })
}

function updateBtnState(i) {
  const btn    = document.getElementById('btn'+i)
  const b      = bets[i]
  const isBetting = roundState === 'STARTING'
  const isRunning = roundState === 'RUNNING'

  if (b.active && !b.cashedOut && isRunning) {
    btn.textContent = 'CASH OUT'
    btn.className = 'bp-btn bp-btn-cashout'
    btn.disabled = false
  } else if (!b.active && !b.cashedOut && isBetting) {
    btn.textContent = 'BET'
    btn.className = 'bp-btn bp-btn-bet'
    btn.disabled = false
  } else {
    btn.textContent = b.cashedOut ? '✓ CASHED' : 'BET'
    btn.className = 'bp-btn bp-btn-bet'
    btn.disabled = true
  }
}

function updateAutoCashoutPreviews() {
  bets.forEach((_,i) => updateBtnState(i))
}

async function handleBtn(i) {
  const b = bets[i]
  if (b.active && !b.cashedOut && roundState === 'RUNNING') {
    await doCashout(i)
  } else if (!b.active && roundState === 'STARTING') {
    await doBet(i)
  }
}

async function doBet(i) {
  if (!TOKEN) return
  const amount = parseFloat(document.getElementById('amount'+i).value)
  const autoCashout = parseFloat(document.getElementById('cashout'+i).value) || 0
  if (!amount || amount <= 0) return

  const btn = document.getElementById('btn'+i)
  btn.disabled = true

  try {
    const r = await fetch('/tma/v1/granny/bet', {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+TOKEN},
      body: JSON.stringify({ amount: amount.toFixed(2), currency: CURRENCY, auto_cashout: autoCashout || undefined }),
    })
    const d = await r.json()
    if (!r.ok) { alert(d.error || 'Bet failed'); btn.disabled=false; return }
    bets[i].id = d.bet_id
    bets[i].active = true
    bets[i].cashedOut = false
    bets[i].amount = amount
    document.getElementById('panel'+i).classList.add('active-bet')
    tg?.HapticFeedback?.impactOccurred('medium')
    fetchBalance()
  } catch (e) { alert('Network error'); btn.disabled=false }
  updateBtnState(i)
}

async function doCashout(i) {
  if (!TOKEN || !bets[i].id) return
  const btn = document.getElementById('btn'+i)
  btn.disabled = true

  try {
    const r = await fetch('/tma/v1/granny/cashout', {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+TOKEN},
      body: JSON.stringify({ bet_id: bets[i].id }),
    })
    const d = await r.json()
    if (!r.ok) { btn.disabled=false; updateBtnState(i); return }
    bets[i].cashedOut = true
    bets[i].active = false
    document.getElementById('panel'+i).classList.remove('active-bet')
    document.getElementById('panel'+i).classList.add('active-bet')
    const payEl = document.getElementById('payout'+i)
    payEl.textContent = '💊 $' + parseFloat(d.payout).toFixed(2) + ' @ ' + d.multiplier.toFixed(2) + '×'
    payEl.style.display = 'block'
    tg?.HapticFeedback?.notificationOccurred('success')
    fetchBalance()
  } catch { btn.disabled=false }
  updateBtnState(i)
}

// ── Social cashout ticker ─────────────────────────────────────────────────────
function addSocialTick(playerId, multiplier, payout) {
  const ticker = document.getElementById('socialTicker')
  if (!ticker) return
  const shortId = playerId ? '…' + String(playerId).slice(-5) : '???'
  const el = document.createElement('div')
  el.className = 'social-tick'
  el.textContent = '💊 ' + shortId + ' +$' + parseFloat(payout).toFixed(2) + ' @ ' + parseFloat(multiplier).toFixed(2) + '×'
  ticker.insertBefore(el, ticker.firstChild)
  while (ticker.children.length > 4) ticker.removeChild(ticker.lastChild)
  setTimeout(() => {
    el.classList.add('social-tick--out')
    setTimeout(() => el.remove(), 400)
  }, 3000)
}

function halvAmount(i)    { const el=document.getElementById('amount'+i); el.value=Math.max(0.1,parseFloat(el.value||0)/2).toFixed(2) }

function bvbSetPhase(phase) {

  clearInterval(_bvbTickTimer)
  _bvbSirenPlayed = false
  _bvbTickTimer = setInterval(() => {
    if (roundState !== 'STARTING') { clearInterval(_bvbTickTimer); return }
    const remaining = Math.max(0, 10 - (Date.now() - startedAt) / 1000)
    const show = remaining > 0 && remaining <= BVB_WARN_SECS
    document.getElementById('bvbWarning').style.display = show ? 'flex' : 'none'
    if (show && !_bvbSirenPlayed) {
      _bvbSirenPlayed = true
      // Overlay 321.mp3 without touching main music
      _cdAudio.pause()
      _cdAudio.currentTime = 0
      _cdAudio.play().catch(() => {})
    }
  }, 100)
}

function bvbOnStateChange(state) {
  clearTimeout(_bvbFadeTimer)
  clearInterval(_bvbTickTimer)
  document.getElementById('bvbWarning').style.display = 'none'

  if (state === 'RUNNING') {
    bvbSetPhase('fading-out')
    _bvbFadeTimer = setTimeout(() => {
      bvbSetPhase('hidden')
      bvbPause()
    }, BVB_FADE_MS + 50)
    _bvbSirenPlayed = false
    return
  }

  if (state === 'STARTING' || state === 'CREATED' || state === null) {
    bvbSetPhase('visible')
    bvbPlay()
    if (state === 'STARTING') bvbStartWarningTick()
    return
  }

  // CRASHED — warning already hidden above; keep video hidden until next STARTING
}

// Video load error → show static fallback image
document.getElementById('bvbVideo').addEventListener('error', () => {
  document.getElementById('bvbVideo').style.display = 'none'
  document.getElementById('bvbFallback').style.display = 'block'
})

// Pause/resume on tab visibility change (mirrors BettingVideo.tsx)
document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    bvbPause()
  } else if (_bvbPhase === 'visible') {
    bvbPlay()
  }
})

// First-gesture unlock for iOS/Telegram WKWebView (mirrors App.tsx unlockAllMedia)
function _unlockGrannyMedia() {
  document.querySelectorAll('video, audio').forEach(el => {
    if (el.paused) {
      el.play().then(() => {
        // Don't keep countdown audio running after unlock
        if (el === _cdAudio) { el.pause(); el.currentTime = 0 }
      }).catch(() => {})
    }
  })
}
document.addEventListener('touchstart', _unlockGrannyMedia, { once:true, passive:true })
document.addEventListener('click',      _unlockGrannyMedia, { once:true })

// ── Boot ──────────────────────────────────────────────────────────────────────
auth()
connectWS()
// Show betting video immediately on load (CREATED state)
bvbOnStateChange('CREATED')
updateMultVis()
</script>
</body>
