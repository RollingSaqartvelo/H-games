<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>STREET CASH — H-GAMES</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap');
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#05050a;font-family:'Courier New',monospace;user-select:none;-webkit-user-select:none;touch-action:manipulation}
#app{display:flex;flex-direction:column;align-items:center;height:100%;overflow-y:auto;overflow-x:hidden;scrollbar-width:none;padding-top:env(safe-area-inset-top,0);padding-bottom:env(safe-area-inset-bottom,8px)}
#app::-webkit-scrollbar{display:none}

/* ── Top bar ── */
#topbar{width:100%;max-width:440px;display:flex;align-items:center;justify-content:space-between;padding:8px 12px 4px;flex-shrink:0}
#back-btn{background:none;border:1px solid rgba(255,215,0,.25);color:rgba(255,215,0,.7);font-size:20px;width:36px;height:36px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center}
#game-title{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:900;letter-spacing:3px;background:linear-gradient(90deg,#c0c0c0,#ffd700,#ff6b35,#ffd700);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
#balance-display{font-size:14px;font-weight:bold;color:#ffd700;letter-spacing:1px}

/* ── Machine shell ── */
#machine{width:100%;max-width:440px;flex-shrink:0;background:linear-gradient(180deg,#0e0e1c 0%,#070710 100%);border-left:2px solid rgba(255,215,0,.2);border-right:2px solid rgba(255,215,0,.2);padding-bottom:6px}

/* ── Message bar ── */
#msg-bar{text-align:center;padding:7px 12px;font-size:13px;font-weight:bold;letter-spacing:.5px;color:#fff;background:rgba(0,0,0,.5);border-bottom:1px solid rgba(255,215,0,.15);min-height:30px;display:flex;align-items:center;justify-content:center}

/* ── Board ── */
#board{display:flex;flex-direction:column;gap:var(--gap,2px);padding:var(--gap,2px)}
#mid-row{display:flex;gap:var(--gap,2px);align-items:stretch}

/* ── Outer frame cells ── */
.fc{
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
  border-radius:5px;border:1.5px solid #ff6b35;
  position:relative;overflow:hidden;
  background:transparent;
  opacity:.85;
  transition:opacity .15s,box-shadow .08s,border-color .08s,transform .08s;
  z-index:1;
}
.fc img{width:76%;height:76%;object-fit:contain;display:block}
.fc::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.04) 0%,transparent 55%);pointer-events:none}

/* Cursor highlight on outer frame */
.fc.cursor-lit{
  opacity:1 !important;
  border-color:rgba(255,215,0,.95) !important;
  box-shadow:0 0 14px rgba(255,215,0,.9),0 0 28px rgba(255,215,0,.45),inset 0 0 10px rgba(255,215,0,.3) !important;
  transform:scale(1.1) !important;
  z-index:6 !important;
}

/* Cursor final stop — stays lit */
.fc.cursor-stop{
  opacity:1 !important;
  border-color:rgba(255,215,0,1) !important;
  box-shadow:0 0 18px rgba(255,215,0,1),0 0 36px rgba(255,215,0,.55),inset 0 0 12px rgba(255,215,0,.4) !important;
  transform:scale(1.12) !important;
  z-index:6 !important;
  animation:cursor-pulse .5s ease-in-out infinite alternate;
}
@keyframes cursor-pulse{
  from{box-shadow:0 0 14px rgba(255,215,0,.8),0 0 28px rgba(255,215,0,.4)}
  to{box-shadow:0 0 22px rgba(255,215,0,1),0 0 44px rgba(255,215,0,.65),0 0 60px rgba(255,215,0,.25)}
}

/* Chess pattern */
.fc-black{background:#000}
.fc-white{background:#fff}

/* ── Center panel wrapper ── */
#center-panel{
  flex:1;min-width:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:0;padding:3px;position:relative;
  background:linear-gradient(160deg,#ff6b35,#ffd700,#ff6b35);
  border:2px solid #ff6b35;border-radius:10px;overflow:hidden;
  animation:panel-glow 1.5s ease-in-out infinite alternate;
}
@keyframes panel-glow{
  from{border-color:#ff6b35;box-shadow:0 0 8px rgba(255,107,53,.5),0 0 16px rgba(255,215,0,.2)}
  to{border-color:#ffd700;box-shadow:0 0 18px rgba(255,215,0,.8),0 0 36px rgba(255,107,53,.4)}
}
#center-panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(255,107,53,.8),transparent)}

/* ── Decorative lights row ── */
#reel-lights{display:flex;gap:6px;padding:4px 0 2px;flex-shrink:0}
.reel-light{width:6px;height:6px;border-radius:50%;background:#1a1a30;transition:all .08s}
.reel-light.on{background:#ffd700;box-shadow:0 0 6px #ffd700,0 0 12px rgba(255,215,0,.5)}

/* ── Classic slot drum ── */
#slot-drum{
  width:100%;flex-shrink:0;position:relative;
  display:flex;
  background:#0d0d0d;
  border-radius:6px;
  border:2px solid #333;
  box-shadow:
    inset 0 2px 12px rgba(0,0,0,.6),
    0 0 18px rgba(0,229,255,.15),
    0 0 36px rgba(119,0,255,.1);
  overflow:hidden;
}
#slot-drum::before,#slot-drum::after{
  content:'';position:absolute;top:0;bottom:0;width:18px;z-index:8;pointer-events:none;
}
#slot-drum::before{left:0;background:linear-gradient(90deg,rgba(0,0,0,.18),transparent)}
#slot-drum::after{right:0;background:linear-gradient(-90deg,rgba(0,0,0,.18),transparent)}

/* ── Individual reel column ── */
.slot-reel{
  flex:1;display:flex;flex-direction:column;
  border-right:1px solid rgba(0,229,255,.15);
  position:relative;overflow:hidden;
}
.slot-reel:last-child{border-right:none}

/* ── Reel cells ── */
.rc{
  display:flex;align-items:center;justify-content:center;
  position:relative;flex-shrink:0;overflow:hidden;
}
.rc img{object-fit:contain;display:block;transition:transform .1s}
.rc.rc-ctr{background:#fff;position:relative;z-index:2;border:2px solid rgba(0,0,0,.2)}

/* Reel land bounce */
.slot-reel.spinning .rc{filter:blur(3px) brightness(1.1);transition:none}
.rc.land{animation:land-bounce .22s cubic-bezier(.2,1.4,.5,1)}
@keyframes land-bounce{0%{transform:scaleY(.75)}55%{transform:scaleY(1.07)}100%{transform:scaleY(1)}}

/* Win glow on center row */
.rc.rc-ctr.win{animation:pay-glow .4s ease-in-out infinite alternate}
@keyframes pay-glow{
  from{background:rgba(255,215,0,.18);box-shadow:inset 0 0 8px rgba(255,215,0,.3)}
  to{background:rgba(255,215,0,.38);box-shadow:inset 0 0 18px rgba(255,215,0,.6)}
}

/* ── Multiplier card (win display) ── */
.mult-card{
  width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(145deg,#d81b60,#880e4f);
  animation:card-pop .3s cubic-bezier(.2,1.4,.5,1);
}
.mult-card-txt{
  font-family:'Orbitron',sans-serif;font-weight:900;color:#fff;
  text-shadow:0 0 10px rgba(255,180,220,.9),0 2px 4px rgba(0,0,0,.5);
}
@keyframes card-pop{from{transform:scale(.4) rotate(-8deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}

/* ── Big win drum overlay ── */
.drum-big-win{
  position:absolute;inset:0;z-index:20;
  display:flex;align-items:center;justify-content:center;
  background:rgba(8,6,0,.88);
  animation:card-pop .35s cubic-bezier(.2,1.4,.5,1);
}
.drum-big-win-txt{
  font-family:'Orbitron',sans-serif;font-weight:900;color:#ffd700;
  text-shadow:0 0 20px rgba(255,215,0,.9),0 0 40px rgba(255,215,0,.5);
}

/* Win stripe sweep */
#win-stripe{
  display:none;
  position:absolute;left:0;right:0;z-index:7;pointer-events:none;
  background:linear-gradient(90deg,transparent,rgba(255,215,0,.15),transparent);
  animation:stripe-sweep 1s ease-in-out infinite;
}
@keyframes stripe-sweep{0%{opacity:.3}50%{opacity:1}100%{opacity:.3}}

/* ── Center bottom ── */
#sc-bottom{
  width:100%;display:flex;align-items:center;justify-content:center;
  padding:3px 4px 2px;min-height:22px;flex-shrink:0;
}
#sc-win-txt{
  display:none;font-family:'Orbitron',sans-serif;font-weight:900;
  color:#ffd700;letter-spacing:1px;text-shadow:0 0 12px rgba(255,215,0,.8);
  animation:win-pop .35s cubic-bezier(.2,1.4,.5,1);
}
@keyframes win-pop{from{transform:scale(.3);opacity:0}to{transform:scale(1);opacity:1}}
#sc-idle-txt{font-size:8px;letter-spacing:2px;font-family:'Orbitron',sans-serif;background:linear-gradient(90deg,#c0c0c0,#ffd700,#ff6b35,#ffd700);background-size:200%;animation:grad-flow 2s linear infinite;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

/* ── Mini paytable ── */
#legend-wrap{position:relative;margin:0 8px 4px}
#pt-btn{position:absolute;top:-2px;right:-2px;width:22px;height:22px;border-radius:50%;background:linear-gradient(145deg,#2a2000,#1a1400);border:1.5px solid rgba(255,215,0,.5);color:rgba(255,215,0,.8);font-size:11px;font-weight:900;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:10;box-shadow:0 0 8px rgba(255,215,0,.2);font-family:'Orbitron',sans-serif}
#pt-btn:active{transform:scale(.9)}
#legend{background:linear-gradient(160deg,#181210,#0c0a06,#181210);border:2px solid rgba(255,215,0,.35);border-radius:14px;padding:7px 7px 5px;display:flex;flex-direction:column;gap:4px}
.legend-row{display:flex;gap:4px;align-items:stretch}
.li{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border-radius:9px;padding:4px 2px;background:transparent;border:1.5px solid rgba(255,215,0,.2);transition:border-color .15s,transform .1s}
.li.feat{flex:1.2;background:transparent;border:2px solid rgba(255,215,0,.55);box-shadow:0 0 12px rgba(255,215,0,.15)}
.li img{width:36px;height:36px;object-fit:contain}
.li.feat img{width:46px;height:46px}
.li-mult{font-family:'Orbitron',sans-serif;font-size:9px;font-weight:900;color:#ffd700;line-height:1;text-shadow:0 0 6px rgba(255,215,0,.5)}
.li.feat .li-mult{font-size:12px}
.li.active{border-color:rgba(255,215,0,.9);transform:scale(1.06);box-shadow:0 0 14px rgba(255,215,0,.4)}
.li.active .li-mult{color:#fff;text-shadow:0 0 12px #ffd700}

/* ── Paytable modal ── */
#pt-modal{display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.78);backdrop-filter:blur(4px);align-items:flex-end;justify-content:center}
#pt-modal.open{display:flex;animation:ov-in .2s ease}
@keyframes ov-in{from{opacity:0}to{opacity:1}}
#pt-sheet{width:100%;max-width:440px;background:linear-gradient(180deg,#1a1200,#0e0a00,#181000);border:1.5px solid rgba(255,215,0,.4);border-bottom:none;border-radius:20px 20px 0 0;padding:16px 14px max(env(safe-area-inset-bottom,16px),16px);max-height:82vh;overflow-y:auto}
#pt-sheet h3{font-family:'Orbitron',sans-serif;font-size:11px;font-weight:900;letter-spacing:3px;color:#ffd700;text-align:center;margin-bottom:12px}
.pt-row{display:flex;align-items:center;gap:10px;padding:8px;border-radius:10px;margin-bottom:4px;background:rgba(255,215,0,.03);border:1px solid rgba(255,215,0,.1)}
.pt-row img{width:34px;height:34px;object-fit:contain;flex-shrink:0}
.pt-name{flex:1;font-size:11px;color:rgba(255,255,255,.7);letter-spacing:.5px}
.pt-mult{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:900;color:#ffd700;text-shadow:0 0 8px rgba(255,215,0,.5)}
.pt-loss .pt-mult{color:rgba(255,80,80,.8)}
#pt-close{width:100%;margin-top:12px;padding:10px;background:linear-gradient(90deg,#ffd700,#ff8c00,#ffd700);background-size:200%;border:none;border-radius:12px;font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;color:#000;cursor:pointer;animation:grad-flow 2s linear infinite}
@keyframes grad-flow{0%{background-position:0%}100%{background-position:200%}}

/* ── Bet section ── */
#bet-section{padding:4px 8px 2px;display:flex;flex-direction:column;gap:4px}
#bet-display{background:rgba(0,0,0,.7);border:1.5px solid rgba(255,215,0,.3);border-radius:8px;text-align:center;padding:6px 10px;font-size:16px;font-weight:bold;color:#fff;letter-spacing:1px}
#bet-display em{color:rgba(255,215,0,.55);font-style:normal;font-size:11px;margin-right:6px}
#bet-btns{display:flex;gap:4px}
.bet-btn{flex:1;padding:7px 0;background:linear-gradient(145deg,#181828,#0e0e1c);border:1px solid rgba(255,215,0,.3);border-radius:8px;color:#ffd700;font-family:'Courier New',monospace;font-size:12px;font-weight:bold;letter-spacing:1px;cursor:pointer;transition:all .1s}
.bet-btn:active{background:rgba(255,215,0,.15);transform:scale(.96)}

/* ── Action buttons ── */
#action-section{padding:4px 10px 2px;display:flex;align-items:center;justify-content:center;gap:14px}
.action-side{width:52px;height:52px;border-radius:50%;background:linear-gradient(145deg,#181828,#0e0e1c);border:1.5px solid rgba(255,215,0,.3);display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;transition:all .15s}
.action-side:active{transform:scale(.92);border-color:rgba(255,215,0,.7)}
.action-side.auto-on{border-color:#ffd700;box-shadow:0 0 14px rgba(255,215,0,.4)}
#play-btn{width:72px;height:72px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#ffe566,#ffd700 40%,#c89000 100%);border:3px solid rgba(255,255,255,.25);box-shadow:0 4px 24px rgba(255,215,0,.55),0 0 50px rgba(255,215,0,.15),inset 0 2px 0 rgba(255,255,255,.35);display:flex;align-items:center;justify-content:center;font-size:28px;cursor:pointer;transition:all .12s;color:#1a0800}
#play-btn:active:not(:disabled){transform:scale(.92)}
#play-btn:disabled{opacity:.35;cursor:not-allowed;animation:none!important}
@keyframes play-pulse{0%,100%{box-shadow:0 4px 24px rgba(255,215,0,.45),0 0 30px rgba(255,215,0,.1)}50%{box-shadow:0 4px 32px rgba(255,215,0,.9),0 0 60px rgba(255,215,0,.35)}}
#play-btn:not(:disabled){animation:play-pulse 2s ease-in-out infinite}

#demo-badge{text-align:center;font-size:8px;letter-spacing:2px;color:rgba(255,215,0,.3);padding:2px 0 3px}

/* ── Win overlay ── */
#win-overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.88);flex-direction:column;align-items:center;justify-content:center}
#win-overlay.show{display:flex;animation:ov-in .25s ease}
#win-video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none;mix-blend-mode:screen}
#win-video.playing{display:block}
#win-inner{position:relative;z-index:2;background:linear-gradient(160deg,#1c1400,#0e0e00,#1c1400);border:2px solid #ffd700;border-radius:22px;padding:28px 40px;text-align:center;box-shadow:0 0 80px rgba(255,215,0,.4)}
#win-inner.behind{background:rgba(14,14,0,.7);border-color:rgba(255,215,0,.5)}
#ov-sym img{width:80px;height:80px;object-fit:contain;animation:sym-bounce .6s ease-in-out infinite alternate;margin-bottom:8px}
@keyframes sym-bounce{from{transform:scale(1) rotate(-4deg)}to{transform:scale(1.1) rotate(4deg)}}
#ov-title{font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:3px;color:rgba(255,215,0,.6);margin-bottom:4px}
#ov-mult{font-family:'Orbitron',sans-serif;font-size:16px;font-weight:900;color:rgba(255,215,0,.75);margin-bottom:4px}
#ov-amount{font-family:'Orbitron',sans-serif;font-size:34px;font-weight:900;color:#ffd700;letter-spacing:2px;animation:win-pop .4s ease}
#ov-close{margin-top:18px;padding:10px 32px;background:linear-gradient(90deg,#ffd700,#ff6b35,#ffd700);background-size:200%;border:none;border-radius:20px;font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;color:#000;cursor:pointer;animation:grad-flow 2s linear infinite;position:relative;z-index:3}
#ov-close:active{transform:scale(.96)}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <button id="back-btn" onclick="history.back()">‹</button>
    <div id="game-title">STREET CASH</div>
    <div id="balance-display">$—</div>
  </div>

  <div id="machine">
    <div id="msg-bar">Choose your stake and press PLAY</div>
    <div id="board">

      <!-- TOP ROW: fc0–fc7 -->
      <div id="row-top" style="display:flex;gap:var(--gap,2px)"></div>

      <div id="mid-row">
        <!-- LEFT COL: fc8–fc12 -->
        <div id="col-left" style="display:flex;flex-direction:column;gap:var(--gap,2px)"></div>

        <!-- ══ CENTER PANEL ══ -->
        <div id="center-panel">
          <div id="reel-lights">
            <div class="reel-light" id="l0"></div>
            <div class="reel-light" id="l1"></div>
            <div class="reel-light" id="l2"></div>
            <div class="reel-light" id="l3"></div>
            <div class="reel-light" id="l4"></div>
          </div>

          <div id="slot-drum">
            <div id="win-stripe"></div>

            <div class="slot-reel" id="reel-0">
              <div class="rc rc-ctr" id="r0c"></div>
            </div>
            <div class="slot-reel" id="reel-1">
              <div class="rc rc-ctr" id="r1c"></div>
            </div>
            <div class="slot-reel" id="reel-2">
              <div class="rc rc-ctr" id="r2c"></div>
            </div>
          </div>

          <div id="sc-bottom">
            <div id="sc-idle-txt">PRESS PLAY</div>
            <div id="sc-win-txt"></div>
          </div>
        </div>
        <!-- ══ END CENTER PANEL ══ -->

        <!-- RIGHT COL: fc13–fc17 -->
        <div id="col-right" style="display:flex;flex-direction:column;gap:var(--gap,2px)"></div>
      </div>

      <!-- BOTTOM ROW: fc18–fc25 -->
      <div id="row-bot" style="display:flex;gap:var(--gap,2px)"></div>
    </div>

    <!-- Mini paytable -->
    <div id="legend-wrap">
      <button id="pt-btn" onclick="openPaytable()">?</button>
      <div id="legend">
        <div class="legend-row">
          <div class="li feat sym-bg-6" data-sym="6"><img src="/assets/street-cash/sym-6.png"><div class="li-mult">×100</div></div>
          <div class="li sym-bg-5" data-sym="5"><img src="/assets/street-cash/sym-4.png"><div class="li-mult">×75</div></div>
          <div class="li sym-bg-4" data-sym="4"><img src="/assets/street-cash/sym-3.png"><div class="li-mult">×20</div></div>
          <div class="li sym-bg-3" data-sym="3"><img src="/assets/street-cash/sym-2.png"><div class="li-mult">×8</div></div>
        </div>
        <div class="legend-row">
          <div class="li sym-bg-2" data-sym="2"><img src="/assets/street-cash/sym-1.png"><div class="li-mult">×3</div></div>
          <div class="li sym-bg-1" data-sym="1"><img src="/assets/street-cash/sym-0.png"><div class="li-mult">×2</div></div>
          <div class="li sym-bg-0" data-sym="0"><img src="/assets/street-cash/tnt.png"><div class="li-mult">LOSS</div></div>
        </div>
      </div>
    </div>

    <div id="bet-section">
      <div id="bet-display"><em>BET</em><span id="bet-val">$1.00</span></div>
      <div id="bet-btns">
        <button class="bet-btn" onclick="adjBet('min')">MIN</button>
        <button class="bet-btn" onclick="adjBet('x2')">×2</button>
        <button class="bet-btn" onclick="adjBet('half')">×½</button>
        <button class="bet-btn" onclick="adjBet('max')">MAX</button>
      </div>
    </div>

    <div id="action-section">
      <div class="action-side" onclick="openPaytable()">ℹ️</div>
      <button id="play-btn" onclick="onPlay()">▶</button>
      <div class="action-side" id="auto-btn" onclick="toggleAuto()">↻</div>
    </div>
    <div id="demo-badge"></div>
  </div>
</div>

<!-- Paytable modal -->
<div id="pt-modal" onclick="if(event.target===this)closePT()">
  <div id="pt-sheet">
    <h3>HOW TO WIN</h3>
    <p style="text-align:center;font-size:9px;color:rgba(255,215,0,.5);letter-spacing:1px;margin-bottom:10px">CURSOR STOPS ON A SYMBOL · MATCH ON ANY REEL = WIN</p>
    <div class="pt-row"><img src="/assets/street-cash/sym-6.png"><span class="pt-name">Platinum Card</span><span class="pt-mult">×100</span></div>
    <div class="pt-row"><img src="/assets/street-cash/sym-4.png"><span class="pt-name">Watch</span><span class="pt-mult">×75</span></div>
    <div class="pt-row"><img src="/assets/street-cash/sym-3.png"><span class="pt-name">Gold Chain</span><span class="pt-mult">×20</span></div>
    <div class="pt-row"><img src="/assets/street-cash/sym-2.png"><span class="pt-name">Sneaker</span><span class="pt-mult">×8</span></div>
    <div class="pt-row"><img src="/assets/street-cash/sym-1.png"><span class="pt-name">Sunglasses</span><span class="pt-mult">×3</span></div>
    <div class="pt-row"><img src="/assets/street-cash/sym-0.png"><span class="pt-name">Dice</span><span class="pt-mult">×2</span></div>
    <div class="pt-row pt-loss"><img src="/assets/street-cash/tnt.png" style="width:34px;height:34px"><span class="pt-name">TNT — BLOCKER</span><span class="pt-mult">LOSS</span></div>
    <p style="text-align:center;font-size:9px;color:rgba(255,215,0,.3);margin-top:10px;letter-spacing:1px">RTP 94%</p>
    <button id="pt-close" onclick="closePT()">CLOSE</button>
  </div>
</div>

<!-- Big win overlay -->
<div id="win-overlay">
  <video id="win-video" playsinline muted></video>
  <div id="win-inner">
    <div id="ov-sym"><img id="ov-sym-img" src="" alt=""></div>
    <div id="ov-title">CONGRATULATIONS</div>
    <div id="ov-mult"></div>
    <div id="ov-amount"></div>
    <button id="ov-close" onclick="closeOverlay()">COLLECT</button>
  </div>
</div>

<script>
// ── Symbols ───────────────────────────────────────────────────────────────────
// sym-0 = TNT (LOSS), sym-1 = Dice ×2, sym-2..6 = win symbols
const SYMS = [
  { mult:0,   src:'/assets/street-cash/tnt.png',   bg:'sym-bg-0', name:'TNT',     isLoss:true  },
  { mult:2,   src:'/assets/street-cash/sym-0.png', bg:'sym-bg-1', name:'Dice',    isLoss:false },
  { mult:3,   src:'/assets/street-cash/sym-1.png', bg:'sym-bg-2', name:'Shades',  isLoss:false },
  { mult:8,   src:'/assets/street-cash/sym-2.png', bg:'sym-bg-3', name:'Sneaker', isLoss:false },
  { mult:20,  src:'/assets/street-cash/sym-3.png', bg:'sym-bg-4', name:'Chain',   isLoss:false },
  { mult:75,  src:'/assets/street-cash/sym-4.png', bg:'sym-bg-5', name:'Watch',   isLoss:false },
  { mult:100, src:'/assets/street-cash/sym-6.png', bg:'sym-bg-6', name:'Card',    isLoss:false },
]

// Demo weights matching backend (out of 100000)
const DEMO_W = [73200, 21500, 3000, 1500, 700, 80, 20]

// ── Outer frame layout (26 cells, indexed by fc-id) ───────────────────────────
// sym-0=TNT(loss), sym-1=Dice(×2), sym-6=Card(×500) at fc0 top-left corner
// fc0-7=top, fc8-12=left-col, fc13-17=right-col, fc18-25=bottom
const FRAME_LAYOUT = [
  6,1,0,2,1,0,1,3,   // top   fc0–fc7
  4,0,1,0,2,          // left  fc8–fc12
  5,2,0,4,1,          // right fc13–fc17
  0,1,3,0,5,0,1,0    // bot   fc18–fc25
]

// Clockwise traversal order of the 26 cells
const CW_ORDER = [
  0,1,2,3,4,5,6,7,          // top L→R
  13,14,15,16,17,            // right T→B
  25,24,23,22,21,20,19,18,  // bottom R→L
  12,11,10,9,8               // left B→T
]

// For each symbol, which CW positions contain it
const SYM_CW = (() => {
  const map = Array.from({length:7}, () => [])
  CW_ORDER.forEach((fcId, cwPos) => map[FRAME_LAYOUT[fcId]].push(cwPos))
  return map
})()

// ── State ─────────────────────────────────────────────────────────────────────
let bet        = 1.00
let balance    = 1000.00
let spinning   = false
let autoMode   = false
let autoTimer  = null
let token      = null
let demoMode   = true
let CELL       = 44
let GAP        = 2
let REEL_H     = 60
let IMG_SZ     = 46
let cursorCell = null  // fc-element currently showing cursor-stop

// ── Build DOM ─────────────────────────────────────────────────────────────────
function setup() {
  const W = Math.min(window.innerWidth, 440)
  CELL = Math.floor((W - 14) / 8)
  GAP  = 2
  document.documentElement.style.setProperty('--gap', GAP + 'px')

  const topRow = document.getElementById('row-top')
  const botRow = document.getElementById('row-bot')
  const colL   = document.getElementById('col-left')
  const colR   = document.getElementById('col-right')
  const frameSz = Math.round(CELL * .72) + 'px'

  // Checkerboard by 2D position (x+y)%2
  // top y=0: fc0-7 x=0-7 | left y=1-5: fc8-12 x=0 | right y=1-5: fc13-17 x=7 | bot y=6: fc18-25 x=0-7
  const FC_CHESS = [
    0,1,0,1,0,1,0,1,  // fc0-7  top row
    1,0,1,0,1,         // fc8-12 left col
    0,1,0,1,0,         // fc13-17 right col
    0,1,0,1,0,1,0,1   // fc18-25 bottom row
  ]
  function makeFC(id, symIdx) {
    const sym = SYMS[symIdx]
    const d = document.createElement('div')
    const chess = FC_CHESS[id] === 0 ? 'fc-black' : 'fc-white'
    d.className = `fc ${chess}`
    d.id = 'fc' + id
    d.style.cssText = `width:${CELL}px;height:${CELL}px`
    const img = document.createElement('img')
    img.src = sym.src
    img.style.cssText = `width:${frameSz};height:${frameSz}`
    d.appendChild(img)
    return d
  }

  for (let i = 0;  i < 8;  i++) topRow.appendChild(makeFC(i,  FRAME_LAYOUT[i]))
  for (let i = 8;  i <= 12; i++) colL.appendChild(makeFC(i,   FRAME_LAYOUT[i]))
  for (let i = 13; i <= 17; i++) colR.appendChild(makeFC(i,   FRAME_LAYOUT[i]))
  for (let i = 18; i <= 25; i++) botRow.appendChild(makeFC(i, FRAME_LAYOUT[i]))

  const centerH = CELL * 5 + GAP * 4
  document.getElementById('center-panel').style.minHeight = centerH + 'px'

  REEL_H = Math.min(Math.floor(CELL * 2.2), 120)
  IMG_SZ = Math.round(REEL_H * 0.78)
  document.getElementById('slot-drum').style.height = REEL_H + 'px'
  document.querySelectorAll('.rc').forEach(el => el.style.height = REEL_H + 'px')

  const stripe = document.getElementById('win-stripe')
  stripe.style.top    = '0'
  stripe.style.height = REEL_H + 'px'

  for (let ri = 0; ri < 3; ri++) {
    setRC(`r${ri}c`, randSym())
  }
}

// ── Reel cell helpers ──────────────────────────────────────────────────────────
function setRC(id, symIdx) {
  const el = document.getElementById(id)
  if (!el) return
  const sym = SYMS[symIdx]
  el.style.background = ''
  el.innerHTML = `<img src="${sym.src}" style="width:${IMG_SZ}px;height:${IMG_SZ}px;object-fit:contain" alt="">`
}

function randSym() { return Math.floor(Math.random() * SYMS.length) }

// ── Spin one reel ─────────────────────────────────────────────────────────────
function spinReel(ri, finalCtr, stopDelay) {
  return new Promise(resolve => {
    const reel = document.getElementById('reel-' + ri)
    reel.classList.add('spinning')
    const tick = 55
    let elapsed = 0
    const iv = setInterval(() => {
      setRC(`r${ri}c`, randSym())
      elapsed += tick
      if (elapsed >= stopDelay) {
        clearInterval(iv)
        reel.classList.remove('spinning')
        setRC(`r${ri}c`, finalCtr)
        const el = document.getElementById(`r${ri}c`)
        if (el) { el.classList.add('land'); setTimeout(() => el.classList.remove('land'), 300) }
        resolve()
      }
    }, tick)
  })
}

// ── Cursor animation on outer frame ──────────────────────────────────────────
// Runs 1 full clockwise lap then decelerates and stops at a cell with cursorSym.
function runCursor(cursorSym) {
  return new Promise(resolve => {
    // Pick target CW position (random among cells with this symbol)
    const positions = SYM_CW[cursorSym]
    const targetCW  = positions[Math.floor(Math.random() * positions.length)]

    // 1 full lap + steps to reach target
    const totalSteps = 26 + targetCW + 1

    let step = 0
    let prevEl = null

    function getDelay(stepsLeft) {
      if (stepsLeft > 22) return 45
      if (stepsLeft > 15) return 68
      if (stepsLeft > 9)  return 110
      if (stepsLeft > 5)  return 175
      if (stepsLeft > 2)  return 290
      return 430
    }

    function tick() {
      // Remove lit from previous
      if (prevEl) {
        prevEl.classList.remove('cursor-lit')
      }

      const cwPos = step % 26
      const fcId  = CW_ORDER[cwPos]
      const el    = document.getElementById('fc' + fcId)

      const stepsLeft = totalSteps - step - 1

      if (step === totalSteps - 1) {
        // Final stop
        el.classList.add('cursor-stop')
        cursorCell = el
        resolve()
        return
      }

      el.classList.add('cursor-lit')
      prevEl = el
      step++

      setTimeout(tick, getDelay(stepsLeft))
    }

    tick()
  })
}

// ── Lights ────────────────────────────────────────────────────────────────────
let litTimer = null, litIdx = 0
function startLights() {
  const ls = [0,1,2,3,4].map(i => document.getElementById('l'+i))
  ls.forEach(l => l.classList.remove('on'))
  litIdx = 0
  litTimer = setInterval(() => {
    ls.forEach(l => l.classList.remove('on'))
    ls[litIdx % 5].classList.add('on')
    litIdx++
  }, 100)
}
function stopLights() {
  clearInterval(litTimer)
  ;[0,1,2,3,4].forEach(i => {
    const l = document.getElementById('l'+i)
    if (l) { l.classList.add('on'); setTimeout(() => l.classList.remove('on'), 400) }
  })
}

// ── Legend highlight ──────────────────────────────────────────────────────────
function highlightLegend(sym) {
  document.querySelectorAll('.li').forEach(el => el.classList.remove('active'))
  const el = document.querySelector(`.li[data-sym="${sym}"]`)
  if (el) el.classList.add('active')
}

function setMsg(t) { document.getElementById('msg-bar').textContent = t }

// ── Clear win state ───────────────────────────────────────────────────────────
function clearWin() {
  // Remove cursor highlights
  CW_ORDER.forEach(fcId => {
    const el = document.getElementById('fc' + fcId)
    if (el) el.classList.remove('cursor-lit', 'cursor-stop')
  })
  cursorCell = null

  // Remove drum big-win overlays
  document.querySelectorAll('.drum-big-win').forEach(el => el.remove())

  for (let ri = 0; ri < 3; ri++) {
    const el = document.getElementById(`r${ri}c`)
    if (el) { el.classList.remove('win'); setRC(`r${ri}c`, randSym()) }
  }

  document.getElementById('win-stripe').style.display = 'none'
  document.getElementById('sc-win-txt').style.display  = 'none'
  document.getElementById('sc-idle-txt').style.display = 'block'
  document.querySelectorAll('.li').forEach(el => el.classList.remove('active'))
}

// ── Win display ───────────────────────────────────────────────────────────────
function showWinCard(winReel, cursorSym) {
  const mult = SYMS[cursorSym].mult

  if (mult >= 20) {
    // Big win: full drum overlay with giant multiplier
    const drum = document.getElementById('slot-drum')
    const fs = Math.round(REEL_H * 0.95)
    const div = document.createElement('div')
    div.className = 'drum-big-win'
    div.innerHTML = `<div class="drum-big-win-txt" style="font-size:${fs}px">×${mult}</div>`
    drum.appendChild(div)
  } else {
    // Small win: multiplier card on matching reel cell
    const el = document.getElementById(`r${winReel}c`)
    if (!el) return
    const fs = Math.round(IMG_SZ * 0.35)
    el.style.background = ''
    el.innerHTML = `<div class="mult-card"><div class="mult-card-txt" style="font-size:${fs}px">×${mult}</div></div>`
    el.classList.add('win')
  }

  // Win stripe on drum background
  document.getElementById('win-stripe').style.display = 'block'
}

function applyWinText(payout) {
  const winTxt = document.getElementById('sc-win-txt')
  winTxt.textContent = '+$' + payout.toFixed(2)
  winTxt.style.fontSize = payout >= 100 ? '13px' : payout >= 10 ? '15px' : '17px'
  winTxt.style.display = 'block'
  document.getElementById('sc-idle-txt').style.display = 'none'
}

// ── Demo pick ─────────────────────────────────────────────────────────────────
function demoPick() {
  const total = DEMO_W.reduce((a,b) => a+b, 0)
  let r = Math.floor(Math.random() * total)
  for (let i = 0; i < DEMO_W.length; i++) { r -= DEMO_W[i]; if (r < 0) return i }
  return 0
}

function demoResult() {
  const cursorSym = demoPick()
  const payout    = parseFloat((SYMS[cursorSym].mult * bet).toFixed(2))
  let reels   = [randSym(), randSym(), randSym()]
  let winReel = -1

  if (cursorSym === 0) {
    // Loss: show TNT on at least one reel
    const tntReel = Math.floor(Math.random() * 3)
    reels[tntReel] = 0
  } else {
    // Win: winReel shows cursorSym; other reels from {1..6} excluding cursorSym (never TNT)
    winReel = Math.floor(Math.random() * 3)
    reels[winReel] = cursorSym
    for (let i = 0; i < 3; i++) {
      if (i !== winReel) {
        let s
        do { s = 1 + Math.floor(Math.random() * (SYMS.length - 1)) } while (s === cursorSym)
        reels[i] = s
      }
    }
  }

  balance = parseFloat((balance - bet).toFixed(2))
  if (payout > 0) balance = parseFloat((balance + payout).toFixed(2))

  return { cursorSym, reels, winReel, payout }
}

// ── Play ──────────────────────────────────────────────────────────────────────
async function onPlay() {
  if (spinning) return
  if (balance < bet) { setMsg('Insufficient balance'); return }

  spinning = true
  const btn = document.getElementById('play-btn')
  btn.disabled = true
  document.getElementById('bet-section').style.opacity = '0.35'
  document.getElementById('bet-section').style.pointerEvents = 'none'
  clearWin()
  setMsg('Spinning...')
  startLights()

  // ── Fetch result ──────────────────────────────────────────────────────────
  let cursorSym = null, reels = null, winReel = -1, payout = 0

  if (!demoMode && token) {
    try {
      const resp = await fetch('/tma/v1/street-cash/spin', {
        method: 'POST',
        headers: {'Content-Type':'application/json','Authorization':'Bearer '+token},
        body: JSON.stringify({bet})
      })
      if (resp.ok) {
        const d = await resp.json()
        if (d.balance != null) { balance = d.balance; updateBal() }
        cursorSym = d.cursor_sym
        reels     = d.reels
        winReel   = d.win_reel
        payout    = d.payout
      } else if (resp.status === 402) {
        setMsg('Insufficient balance')
        spinning = false; btn.disabled = false; stopLights(); return
      }
    } catch {}
  }

  // Demo fallback
  if (cursorSym === null) {
    const r = demoResult()
    cursorSym = r.cursorSym
    reels     = r.reels
    winReel   = r.winReel
    payout    = r.payout
    updateBal()
  }

  // ── Reels + cursor start simultaneously ──────────────────────────────────
  await Promise.all([
    spinReel(0, reels[0], 600),
    spinReel(1, reels[1], 700),
    spinReel(2, reels[2], 800),
    runCursor(cursorSym),
  ])

  stopLights()

  // ── Phase 3: Show result ──────────────────────────────────────────────────
  highlightLegend(cursorSym)

  if (winReel >= 0 && payout > 0) {
    showWinCard(winReel, cursorSym)
    applyWinText(payout)
    setMsg(`${SYMS[cursorSym].name.toUpperCase()}! ×${SYMS[cursorSym].mult} → +$${payout.toFixed(2)}`)
    if (payout >= bet * 8) setTimeout(() => showOverlay(cursorSym, payout), 400)
  } else {
    setMsg('Better luck next time!')
  }

  spinning = false
  btn.disabled = false
  document.getElementById('bet-section').style.opacity = ''
  document.getElementById('bet-section').style.pointerEvents = ''

  if (autoMode) autoTimer = setTimeout(onPlay, payout > 0 ? 2800 : 1600)
}

// ── Win overlay ───────────────────────────────────────────────────────────────
function showOverlay(sym, payout) {
  document.getElementById('ov-sym-img').src    = SYMS[sym].src
  document.getElementById('ov-mult').textContent   = '×' + SYMS[sym].mult
  document.getElementById('ov-amount').textContent = '$' + payout.toFixed(2)
  document.getElementById('win-overlay').classList.add('show')
  const vid   = document.getElementById('win-video')
  const inner = document.getElementById('win-inner')
  vid.src = `/video/street-cash/win-${sym}.mp4`
  vid.load()
  vid.play()
    .then(() => { vid.classList.add('playing'); inner.classList.add('behind') })
    .catch(() => { vid.classList.remove('playing'); inner.classList.remove('behind') })
}
function closeOverlay() {
  const vid = document.getElementById('win-video')
  vid.pause(); vid.src = ''
  vid.classList.remove('playing')
  document.getElementById('win-inner').classList.remove('behind')
  document.getElementById('win-overlay').classList.remove('show')
}

// ── Paytable ──────────────────────────────────────────────────────────────────
function openPaytable() { document.getElementById('pt-modal').classList.add('open') }
function closePT()       { document.getElementById('pt-modal').classList.remove('open') }

// ── Auto ──────────────────────────────────────────────────────────────────────
function toggleAuto() {
  autoMode = !autoMode
  document.getElementById('auto-btn').classList.toggle('auto-on', autoMode)
  if (!autoMode) { clearTimeout(autoTimer); autoTimer = null }
  else if (!spinning) onPlay()
}

// ── Bet ───────────────────────────────────────────────────────────────────────
const BET_MIN = 0.10, BET_MAX = 100
function adjBet(a) {
  if (spinning) return
  if (a==='min')  bet = BET_MIN
  if (a==='max')  bet = Math.min(BET_MAX, parseFloat(balance.toFixed(2)))
  if (a==='x2')   bet = Math.min(BET_MAX, parseFloat((bet*2).toFixed(2)))
  if (a==='half') bet = Math.max(BET_MIN, parseFloat((bet/2).toFixed(2)))
  document.getElementById('bet-val').textContent = '$' + bet.toFixed(2)
}

// ── Balance ───────────────────────────────────────────────────────────────────
function updateBal() {
  document.getElementById('balance-display').textContent = '$' + balance.toFixed(2)
  if (demoMode) localStorage.setItem('sc_bal', balance.toFixed(2))
}

// ── Black-background removal via canvas ───────────────────────────────────────
async function removeBg(src) {
  if (!src || src.endsWith('.svg') || src.startsWith('data:')) return src
  return new Promise(resolve => {
    const img = new Image()
    img.onload = () => {
      const SZ = 300
      const canvas = document.createElement('canvas')
      canvas.width = SZ; canvas.height = SZ
      const ctx = canvas.getContext('2d')
      ctx.drawImage(img, 0, 0, SZ, SZ)
      const id = ctx.getImageData(0, 0, SZ, SZ)
      const d = id.data
      for (let i = 0; i < d.length; i += 4) {
        if (d[i] < 15 && d[i+1] < 15 && d[i+2] < 15) d[i+3] = 0
      }
      ctx.putImageData(id, 0, 0)
      resolve(canvas.toDataURL('image/png'))
    }
    img.onerror = () => resolve(src)
    img.src = src
  })
}

async function preprocessAssets() {
  SYMS.forEach(sym => { sym._orig = sym.src })
  await Promise.all(SYMS.map(async sym => {
    sym.src = await removeBg(sym._orig)
  }))
  document.querySelectorAll('#legend img, #pt-sheet img').forEach(img => {
    const attr = img.getAttribute('src')
    const sym = SYMS.find(s => s._orig === attr)
    if (sym) img.src = sym.src
  })
}

// ── Boot ──────────────────────────────────────────────────────────────────────
async function boot() {
  const tg = window.Telegram?.WebApp
  if (tg) { tg.ready(); tg.expand() }
  token = localStorage.getItem('crash_token')
  try {
    const initData = tg?.initData || ''
    if (initData || token) {
      const r = await fetch('/tma/auth', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({init_data: initData})
      })
      if (r.ok) {
        const d = await r.json()
        if (d.token) { token = d.token; localStorage.setItem('crash_token', d.token) }
        if (d.balance != null) { balance = parseFloat(d.balance); demoMode = false }
      }
    }
  } catch {}
  if (demoMode) {
    const s = parseFloat(localStorage.getItem('sc_bal'))
    balance = isNaN(s) ? 1000 : s
    document.getElementById('demo-badge').textContent = '· DEMO · $1,000 PRACTICE BALANCE ·'
  }
  await preprocessAssets()
  setup()
  updateBal()
}

boot()
</script>
