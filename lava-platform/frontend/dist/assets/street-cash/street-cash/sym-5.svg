<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="body" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#2a2a3a"/><stop offset="100%" stop-color="#0a0a14"/></linearGradient>
    <linearGradient id="btn" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#404050"/><stop offset="100%" stop-color="#1a1a28"/></linearGradient>
    <linearGradient id="trim" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#c0c0c0"/><stop offset="50%" stop-color="#e8e8e8"/><stop offset="100%" stop-color="#888"/></linearGradient>
    <filter id="led"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="g2"><feGaussianBlur stdDeviation="1.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <!-- Fob body -->
  <rect x="22" y="18" width="56" height="72" rx="12" fill="url(#trim)"/>
  <rect x="24" y="20" width="52" height="68" rx="10" fill="url(#body)"/>
  <!-- Logo circle -->
  <circle cx="50" cy="36" r="12" fill="#1a1a28" stroke="url(#trim)" stroke-width="1.5"/>
  <text x="50" y="41" text-anchor="middle" font-family="Arial,sans-serif" font-weight="900" font-size="12" fill="#ffd700">H</text>
  <!-- Buttons -->
  <rect x="30" y="54" width="40" height="9" rx="4" fill="url(#btn)" stroke="url(#trim)" stroke-width="1"/>
  <rect x="30" y="67" width="40" height="9" rx="4" fill="url(#btn)" stroke="url(#trim)" stroke-width="1"/>
  <rect x="30" y="80" width="40" height="7" rx="3" fill="url(#btn)" stroke="url(#trim)" stroke-width="1"/>
  <!-- Button icons -->
  <rect x="38" y="57" width="6" height="3" rx="1" fill="#666"/>
  <rect x="48" y="57" width="6" height="3" rx="1" fill="#666"/>
  <rect x="58" y="57" width="6" height="3" rx="1" fill="#666"/>
  <circle cx="40" cy="71.5" r="2.5" fill="#333"/>
  <circle cx="50" cy="71.5" r="2.5" fill="#333"/>
  <circle cx="60" cy="71.5" r="2.5" fill="#333"/>
  <!-- LED indicator glow -->
  <circle cx="50" cy="84" r="3" fill="#0088ff" filter="url(#led)"/>
  <circle cx="50" cy="84" r="1.8" fill="#44aaff"/>
  <!-- Top ring -->
  <ellipse cx="50" cy="18" rx="8" ry="5" fill="url(#trim)"/>
  <ellipse cx="50" cy="18" rx="5" ry="3" fill="#0a0a14"/>
  <!-- Chrome trim highlight -->
  <rect x="22" y="18" width="56" height="72" rx="12" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
</svg>
