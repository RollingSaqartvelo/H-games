<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 115">
  <!-- Fuse rope -->
  <path d="M53 36 Q64 26 60 16 Q56 8 64 10" stroke="#7a5900" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- Spark glow -->
  <circle cx="64" cy="10" r="9" fill="#FFD700" opacity="0.35"/>
  <!-- Spark core -->
  <circle cx="64" cy="10" r="6" fill="#FFD700"/>
  <circle cx="64" cy="10" r="3.5" fill="#FF8C00"/>
  <circle cx="64" cy="10" r="1.5" fill="#fff"/>
  <!-- Spark rays -->
  <line x1="64" y1="2" x2="64" y2="-2" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>
  <line x1="69" y1="6" x2="73" y2="3" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>
  <line x1="59" y1="6" x2="55" y2="3" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>
  <line x1="71" y1="12" x2="75" y2="12" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>
  <line x1="57" y1="12" x2="53" y2="12" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>
  <!-- Body shadow -->
  <rect x="22" y="37" width="58" height="76" rx="11" fill="#7B241C"/>
  <!-- Main cylinder -->
  <rect x="20" y="35" width="58" height="76" rx="11" fill="#C0392B"/>
  <!-- Top cap highlight -->
  <rect x="20" y="35" width="58" height="24" rx="11" fill="#E74C3C"/>
  <!-- Cap bottom line -->
  <rect x="20" y="55" width="58" height="4" fill="#922B21"/>
  <!-- Black warning stripes -->
  <rect x="20" y="67" width="58" height="7" fill="rgba(0,0,0,0.28)"/>
  <rect x="20" y="86" width="58" height="7" fill="rgba(0,0,0,0.28)"/>
  <!-- TNT label -->
  <text x="49" y="48" text-anchor="middle" dominant-baseline="middle"
        font-family="Impact,Arial Black,sans-serif"
        font-size="17" font-weight="900" fill="white" letter-spacing="4">TNT</text>
  <!-- Danger X -->
  <line x1="33" y1="73" x2="65" y2="93" stroke="#FFD700" stroke-width="5" stroke-linecap="round" opacity="0.9"/>
  <line x1="65" y1="73" x2="33" y2="93" stroke="#FFD700" stroke-width="5" stroke-linecap="round" opacity="0.9"/>
</svg>
